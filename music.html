<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dil Çınarı Şarkısı</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --deep-red: #8B1A1A;
    --ivory: #F5F0E8;
    --dark: #120303;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Crimson Text', serif;
    background: radial-gradient(ellipse at 30% 50%, rgba(139,26,26,0.35) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 30%, rgba(201,168,76,0.12) 0%, transparent 50%),
                var(--dark);
    color: var(--ivory);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(139,26,26,0.02) 60px, rgba(139,26,26,0.02) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(139,26,26,0.02) 60px, rgba(139,26,26,0.02) 61px);
    pointer-events: none;
  }

  .back-link {
    position: fixed; top: 1.2rem; left: 1.5rem;
    font-family: 'Cinzel', serif; font-size: 0.72rem;
    color: rgba(201,168,76,0.7); text-decoration: none;
    letter-spacing: 0.1em;
    border: 1px solid rgba(201,168,76,0.25);
    padding: 0.4rem 1rem;
    border-radius: 2px;
    transition: all 0.2s;
    z-index: 10;
  }
  .back-link:hover {
    color: var(--gold);
    border-color: rgba(201,168,76,0.6);
    background: rgba(139,26,26,0.2);
  }

  .player-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    position: relative; z-index: 1;
  }

  .ornament {
    color: var(--gold); font-size: 1.2rem;
    letter-spacing: 0.8rem; opacity: 0.7;
  }

  .player-tag {
    font-family: 'Cinzel', serif; font-size: 0.65rem;
    letter-spacing: 0.2em; color: var(--gold);
  }

  .player-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900; line-height: 1.1;
    text-align: center;
    color: var(--ivory);
  }

  .music-box {
    background: linear-gradient(135deg, rgba(139,26,26,0.2) 0%, rgba(26,18,9,0.5) 100%);
    border: 1px solid rgba(201,168,76,0.3);
    padding: 3rem 3.5rem;
    text-align: center;
    border-radius: 4px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
  }

  .disc {
    width: 110px; height: 110px;
    background: radial-gradient(circle, #111 30%, var(--deep-red) 31%, #222 60%, var(--gold) 100%);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem;
    box-shadow: 0 0 30px rgba(139,26,26,0.5);
    border: 2px solid rgba(201,168,76,0.5);
    transition: box-shadow 0.3s;
  }
  .disc.playing {
    animation: spin 4s linear infinite;
    box-shadow: 0 0 40px rgba(201,168,76,0.4);
  }
  @keyframes spin { 100% { transform: rotate(360deg); } }

  .status-text {
    font-size: 1rem; font-style: italic;
    opacity: 0.75; margin: 0;
  }

  .play-btn {
    background: linear-gradient(135deg, var(--deep-red), #5c0505);
    border: 1px solid var(--gold);
    color: var(--ivory);
    font-family: 'Cinzel', serif;
    padding: 1rem 3rem;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 2px;
    margin-top: 0.5rem;
  }
  .play-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(201,168,76,0.4);
    background: linear-gradient(135deg, #a62424, var(--deep-red));
  }
  .play-btn:active { transform: scale(0.97); }

  .divider {
    width: 60px; height: 2px;
    background: var(--gold);
    opacity: 0.6;
  }

  .desc {
    font-size: 1rem; line-height: 1.8;
    color: rgba(245,240,232,0.65);
    text-align: center;
    max-width: 420px;
    font-style: italic;
  }
</style>
</head>
<body>

<a class="back-link" href="index.html">← Ana Sayfa</a>

<audio id="audio" src="music.mpeg" loop></audio>

<div class="player-wrap">
  <div class="ornament">✦ ✦ ✦</div>
  <span class="player-tag">DİNLETİ — ORTAK SESİMİZ</span>
  <h1 class="player-title">Dil Çınarı<br>Şarkısı</h1>

  <div class="music-box">
    <div class="disc" id="disc">🎵</div>
    <p class="status-text" id="status">Müziği başlatmak için butona tıklayın</p>
    <div class="divider"></div>
    <button class="play-btn" id="playBtn" onclick="toggleMusic()">▶ ŞARKIYI ÇAL</button>
  </div>

  <p class="desc">
    Gövdesi tarih, yaprakları farklı coğrafyalar olan bu ulu çınarın sesine kulak verin.
  </p>
</div>

<script>
  const audio = document.getElementById('audio');
  const disc = document.getElementById('disc');
  const btn = document.getElementById('playBtn');
  const status = document.getElementById('status');

  function toggleMusic() {
    if (audio.paused) {
      audio.volume = 0.7;
      audio.play().then(() => {
        btn.textContent = '⏸ ŞARKIYI DURDUR';
        disc.classList.add('playing');
        status.textContent = 'Şimdi çalıyor...';
      }).catch(() => {
        status.textContent = 'Tarayıcı oynatmayı engelledi.';
      });
    } else {
      audio.pause();
      btn.textContent = '▶ ŞARKIYI ÇAL';
      disc.classList.remove('playing');
      status.textContent = 'Duraklatıldı';
    }
  }
</script>
</body>
</html>
